# education-data-hub — internal nginx config for the production frontend container.
# This nginx runs INSIDE the khda-datahub-frontend container and serves the
# Vite-built static files. The outer kpmg-nginx forwards /khdaDataHub/ traffic here.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache (Vite hashes filenames so this is safe).
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every non-asset path returns index.html so React Router
    # can handle client-side routing (e.g. /khdaDataHub/some/deep/route).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No-cache on the entry point so users always get the latest bundle refs.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}