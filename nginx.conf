# education-data-hub - internal nginx config for the production frontend container.
# This nginx runs INSIDE the khda-datahub-frontend container and serves the
# Vite-built static files. The outer kpmg-nginx forwards /khdaDataHub/ traffic here.
#
# Vite is built with base: "/khdaDataHub/", so the HTML references assets at
# /khdaDataHub/assets/... The `alias` directive below maps that prefix back to
# the real file root so the assets resolve correctly.
 
server {
    listen 80;
    server_name _;
 
    # Map /khdaDataHub/<anything> -> /usr/share/nginx/html/<anything>
    location /khdaDataHub/ {
        alias /usr/share/nginx/html/;
        index index.html;
 
        # SPA fallback: any unmatched client-side route returns the entry HTML.
        try_files $uri $uri/ /khdaDataHub/index.html;
    }
 
    # Proxy Ollama API requests to the shared Ollama service on the Docker network.
    # The browser calls /khdaDataHub/ollama/api/... which avoids CORS issues.
    location /khdaDataHub/ollama/ {
        proxy_pass http://ollama-shared:11434/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Hitting root redirects into the app.
    location = / {
        return 301 /khdaDataHub/;
    }
}